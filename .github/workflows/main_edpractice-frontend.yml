name: Build and deploy React app to Azure Static Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/frontend" # Path to your frontend source
          api_location: "" # No backend in this job
          output_location: "build" # Path to build artifact
        env:
          REACT_APP_API_URL: https://samkalp-backend-hacrbsdmccdbcpfa.centralindia-01.azurewebsites.net
